<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookmarks</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #dbeafe;
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .btn-add {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add:hover { background: var(--primary-dark); }

    #searchInput {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    #searchInput:focus { border-color: var(--primary); }

    #categoryBar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .cat-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover { background: var(--primary-light); }
    .cat-btn.active {
      background: var(--primary);
      color: #fff;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .card-favicon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .card-letter {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      word-break: break-word;
    }
    .card-title:hover { color: var(--primary); }

    .card-url {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      margin-bottom: 0.5rem;
    }

    .card-badge {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      margin-bottom: 0.4rem;
    }

    .card-notes {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
      line-height: 1.4;
    }

    .btn-delete {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      transition: all 0.2s;
      line-height: 1;
    }
    .btn-delete:hover {
      color: var(--danger);
      background: #fef2f2;
    }

    #emptyState {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }

    /* Modal */
    #modalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #modalOverlay.open { display: flex; }

    #modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    #modal h2 {
      margin-bottom: 1.25rem;
      font-size: 1.3rem;
      color: var(--text);
    }

    #modal label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    #modal input, #modal textarea {
      display: block;
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.6rem 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    #modal input:focus, #modal textarea:focus { border-color: var(--primary); }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }

    .btn-cancel {
      padding: 0.55rem 1.1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: #cbd5e1; color: var(--text); }

    .btn-save {
      padding: 0.55rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: var(--primary-dark); }

    @media (max-width: 640px) {
      body { padding: 1rem 0.75rem; }
      header { flex-direction: column; gap: 0.75rem; align-items: stretch; text-align: center; }
      #grid { grid-template-columns: 1fr; }
      #modal { margin: 1rem; max-width: calc(100% - 2rem); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>My Bookmarks</h1>
      <button class="btn-add" id="addBtn">+ Add Bookmark</button>
    </header>

    <input type="text" id="searchInput" placeholder="Search bookmarks by title, category, or URL...">

    <div id="categoryBar"></div>

    <div id="grid"></div>
  </div>

  <div id="modalOverlay">
    <div id="modal">
      <h2>Add Bookmark</h2>
      <form id="bookmarkForm">
        <label>Title <span style="color:var(--danger)">*</span>
          <input type="text" id="fTitle" required>
        </label>
        <label>URL <span style="color:var(--danger)">*</span>
          <input type="url" id="fUrl" required placeholder="https://example.com">
        </label>
        <label>Category <span style="color:var(--danger)">*</span>
          <input type="text" id="fCategory" required placeholder="e.g. Dev Tools, News, Social">
        </label>
        <label>Notes
          <textarea id="fNotes" rows="3" placeholder="Optional notes..."></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'my-bookmarks';
    let bookmarks = [];
    let activeCategory = null;

    const SAMPLE_BOOKMARKS = [
      { id: 1, title: 'MDN Web Docs', url: 'https://developer.mozilla.org', category: 'Dev Tools', notes: 'Mozilla\'s comprehensive web documentation', createdAt: '2026-01-15T10:00:00Z' },
      { id: 2, title: 'GitHub', url: 'https://github.com', category: 'Dev Tools', notes: 'Code hosting and collaboration', createdAt: '2026-01-15T10:01:00Z' },
      { id: 3, title: 'Hacker News', url: 'https://news.ycombinator.com', category: 'News', notes: 'Tech news aggregator', createdAt: '2026-01-15T10:02:00Z' },
      { id: 4, title: 'Stack Overflow', url: 'https://stackoverflow.com', category: 'Dev Tools', notes: 'Q&A for programmers', createdAt: '2026-01-15T10:03:00Z' },
      { id: 5, title: 'Wikipedia', url: 'https://en.wikipedia.org', category: 'Reference', notes: 'Free online encyclopedia', createdAt: '2026-01-15T10:04:00Z' },
      { id: 6, title: 'YouTube', url: 'https://youtube.com', category: 'Entertainment', notes: 'Video streaming platform', createdAt: '2026-01-15T10:05:00Z' },
      { id: 7, title: 'Reddit', url: 'https://reddit.com', category: 'Social', notes: 'Community discussions and forums', createdAt: '2026-01-15T10:06:00Z' },
      { id: 8, title: 'CSS-Tricks', url: 'https://css-tricks.com', category: 'Dev Tools', notes: 'CSS guides, tips, and techniques', createdAt: '2026-01-15T10:07:00Z' },
      { id: 9, title: 'The Verge', url: 'https://theverge.com', category: 'News', notes: 'Technology and science news', createdAt: '2026-01-15T10:08:00Z' },
      { id: 10, title: 'Notion', url: 'https://notion.so', category: 'Productivity', notes: 'Notes and project management', createdAt: '2026-01-15T10:09:00Z' },
    ];

    const AVATAR_COLORS = ['#2563eb','#7c3aed','#db2777','#ea580c','#16a34a','#0891b2','#4f46e5','#c026d3'];

    function getAvatarColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    function getDomain(url) {
      try { return new URL(url).hostname; } catch { return ''; }
    }

    function loadBookmarks() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        bookmarks = JSON.parse(data);
      } else {
        bookmarks = [...SAMPLE_BOOKMARKS];
        saveBookmarks();
      }
    }

    function saveBookmarks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function addBookmark(title, url, category, notes) {
      bookmarks.unshift({ id: Date.now(), title, url, category, notes, createdAt: new Date().toISOString() });
      saveBookmarks();
      renderAll();
    }

    function deleteBookmark(id) {
      bookmarks = bookmarks.filter(b => b.id !== id);
      saveBookmarks();
      renderAll();
    }

    function getCategories() {
      const cats = new Set(bookmarks.map(b => b.category));
      return [...cats].sort();
    }

    function getFilteredBookmarks() {
      let filtered = bookmarks;
      if (activeCategory) {
        filtered = filtered.filter(b => b.category === activeCategory);
      }
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (query) {
        filtered = filtered.filter(b =>
          b.title.toLowerCase().includes(query) ||
          b.url.toLowerCase().includes(query) ||
          b.category.toLowerCase().includes(query) ||
          (b.notes && b.notes.toLowerCase().includes(query))
        );
      }
      return filtered;
    }

    function renderCategoryBar() {
      const bar = document.getElementById('categoryBar');
      const cats = getCategories();
      let html = `<button class="cat-btn${activeCategory === null ? ' active' : ''}" data-cat="">All</button>`;
      for (const cat of cats) {
        html += `<button class="cat-btn${activeCategory === cat ? ' active' : ''}" data-cat="${cat}">${cat}</button>`;
      }
      bar.innerHTML = html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const filtered = getFilteredBookmarks();

      if (filtered.length === 0) {
        grid.innerHTML = '<div id="emptyState">No bookmarks found.</div>';
        return;
      }

      let html = '';
      for (const b of filtered) {
        const domain = getDomain(b.url);
        const letter = b.title.charAt(0).toUpperCase();
        const color = getAvatarColor(b.category);
        const faviconUrl = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=32` : '';

        html += `<div class="card">
          <button class="btn-delete" data-delete="${b.id}" title="Delete bookmark">&times;</button>
          <div class="card-header">
            ${faviconUrl
              ? `<img class="card-favicon" src="${faviconUrl}" alt="" onerror="this.outerHTML='<div class=\\'card-letter\\' style=\\'background:${color}\\'>${letter}</div>'">`
              : `<div class="card-letter" style="background:${color}">${letter}</div>`
            }
            <a class="card-title" href="${escapeHtml(b.url)}" target="_blank" rel="noopener">${escapeHtml(b.title)}</a>
          </div>
          <span class="card-url">${escapeHtml(b.url)}</span>
          <span class="card-badge">${escapeHtml(b.category)}</span>
          ${b.notes ? `<p class="card-notes">${escapeHtml(b.notes)}</p>` : ''}
        </div>`;
      }
      grid.innerHTML = html;
    }

    function renderAll() {
      renderCategoryBar();
      renderGrid();
    }

    // Event listeners
    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('fTitle').focus();
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('bookmarkForm').reset();
    });

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('open');
        document.getElementById('bookmarkForm').reset();
      }
    });

    document.getElementById('bookmarkForm').addEventListener('submit', (e) => {
      e.preventDefault();
      let url = document.getElementById('fUrl').value.trim();
      if (url && !url.match(/^https?:\/\//i)) url = 'https://' + url;
      addBookmark(
        document.getElementById('fTitle').value.trim(),
        url,
        document.getElementById('fCategory').value.trim(),
        document.getElementById('fNotes').value.trim()
      );
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('bookmarkForm').reset();
    });

    document.getElementById('searchInput').addEventListener('input', renderGrid);

    document.getElementById('categoryBar').addEventListener('click', (e) => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      activeCategory = btn.dataset.cat || null;
      renderAll();
    });

    document.getElementById('grid').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-delete]');
      if (!btn) return;
      deleteBookmark(Number(btn.dataset.delete));
    });

    // Init
    loadBookmarks();
    renderAll();
  </script>
</body>
</html>
